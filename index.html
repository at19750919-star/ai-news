<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>AI 新聞日報</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#eef2f7;
  --panel:#ffffff;
  --panel-soft:#f9fafb;
  --paper:#fffaf0;
  --ink:#111827;
  --muted:#667085;
  --faint:#98a2b3;
  --line:#e5e7eb;
  --line-strong:#d0d5dd;
  --shadow:0 16px 34px rgba(15,23,42,.09);
  --claude:#dc6803;
  --claude-soft:#fff4e5;
  --openai:#039855;
  --openai-soft:#e9f8ef;
  --gemini:#2563eb;
  --gemini-soft:#eef4ff;
  --grok:#344054;
  --grok-soft:#f2f4f7;
  --news:#0f766e;
  --news-soft:#ecfdf3;
  --tool:#0d9488;
  --model:#7c3aed;
  --tutorial:#b45309;
  --agent:#db2777;
  --integration:#6d28d9;
  --open:#059669;
  --sans:'Noto Sans TC','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'Inter','SF Mono',Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--sans);
  background:
    linear-gradient(90deg,rgba(17,24,39,.035) 1px,transparent 1px),
    linear-gradient(180deg,rgba(17,24,39,.03) 1px,transparent 1px),
    var(--bg);
  background-size:48px 48px;
  color:var(--ink);
  line-height:1.65;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none}
button{font:inherit}
.page{width:min(1720px,calc(100vw - 48px));margin:0 auto;padding:18px 0 44px}
.header{
  position:relative;
  display:grid;
  grid-template-columns:minmax(0,1fr) 220px;
  gap:0;
  align-items:stretch;
  margin-bottom:12px;
  border:1px solid var(--line-strong);
  border-top:4px solid var(--ink);
  border-radius:10px;
  background:
    linear-gradient(135deg,rgba(255,250,240,.96),rgba(255,255,255,.92) 62%,rgba(233,248,239,.68));
  box-shadow:var(--shadow);
  overflow:hidden;
}
.header:before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(90deg,transparent 0 34px,rgba(17,24,39,.045) 34px 35px);
  mix-blend-mode:multiply;
}
.header-main{position:relative;padding:16px 22px 18px;border-left:7px solid var(--openai)}
.eyebrow{font-size:.72rem;font-weight:900;letter-spacing:.18em;color:var(--openai);text-transform:uppercase;margin-bottom:4px}
.header h1{font-size:clamp(2rem,3vw,3.15rem);line-height:1;font-weight:800;letter-spacing:0}
.sub{max-width:760px;color:#475467;font-size:.98rem;margin-top:9px;font-weight:600}
.today-chip{
  position:relative;
  align-self:stretch;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  background:#111827;
  color:#fff;
  border-left:1px solid rgba(255,255,255,.14);
  padding:16px 18px;
  min-width:200px;
}
.today-chip:before{content:"";width:42px;height:4px;background:var(--openai);border-radius:999px;margin-bottom:12px}
.today-chip span{display:block;color:#a7f3d0;font-size:.76rem;font-weight:800;letter-spacing:.08em}
.today-chip strong{display:block;font-size:1rem;margin-top:4px}
.toolbar{position:sticky;top:0;z-index:10;background:rgba(238,242,247,.94);backdrop-filter:blur(14px);padding:10px 0 11px;border-bottom:1px solid rgba(208,213,221,.86)}
.channel-bar,.topic-bar{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;min-width:0;max-width:100%}
.topic-bar{margin-top:9px}
.channel-btn,.topic-btn,.view-btn{border:1px solid var(--line-strong);background:rgba(255,255,255,.9);color:var(--muted);cursor:pointer;white-space:nowrap;border-radius:10px;transition:background .15s,border-color .15s,color .15s,box-shadow .15s,transform .15s}
.channel-btn{display:flex;align-items:center;gap:9px;padding:9px 13px;font-weight:900;font-size:.94rem;box-shadow:0 4px 0 rgba(17,24,39,.06)}
.channel-btn .count{font-family:var(--mono);font-size:.78rem;color:var(--faint)}
.channel-btn .dot{width:9px;height:9px;border-radius:999px;background:var(--faint)}
.channel-btn:hover,.topic-btn:hover,.view-btn:hover{border-color:#98a2b3;color:var(--ink);transform:translateY(-1px)}
.channel-btn.active,.topic-btn.active,.view-btn.active{background:var(--ink);border-color:var(--ink);color:#fff;box-shadow:0 10px 20px rgba(17,24,39,.18)}
.channel-btn.active .count{color:rgba(255,255,255,.76)}
.topic-btn,.view-btn{padding:6px 10px;font-size:.82rem;font-weight:800}
.toolbar-row{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-top:10px;min-width:0}
.result-summary{font-size:.88rem;color:var(--muted);font-weight:700}
.view-toggle{display:flex;gap:6px;flex-shrink:0}
.layout{display:grid;grid-template-columns:260px minmax(0,1fr);gap:18px;margin-top:14px}
.rail{position:sticky;top:124px;align-self:start}
.rail-card{background:rgba(255,255,255,.94);border:1px solid var(--line-strong);border-top:5px solid var(--ink);box-shadow:var(--shadow);border-radius:10px;padding:15px}
.rail-title{font-size:.88rem;font-weight:900;color:var(--muted);margin-bottom:14px;letter-spacing:.04em}
.stat-list{display:grid;gap:10px}
.stat-row{display:flex;align-items:center;justify-content:space-between;font-size:.92rem;color:var(--muted)}
.stat-row strong{font-family:var(--mono);font-size:1rem;color:var(--ink)}
.stat-name{display:flex;align-items:center;gap:8px;font-weight:700}
.stat-dot{width:8px;height:8px;border-radius:999px;background:var(--faint)}
.feed{min-width:0}
.channel-overview{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px}
.channel-panel{position:relative;background:rgba(255,255,255,.96);border:1px solid var(--line-strong);border-top:6px solid var(--accent);border-radius:10px;box-shadow:var(--shadow);overflow:hidden}
.channel-panel:before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--accent)}
.channel-panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 18px 16px 22px;background:linear-gradient(90deg,var(--soft),#fff)}
.channel-panel-head h2{font-size:1.26rem;font-weight:900;line-height:1.25}
.channel-panel-head button{border:1px solid var(--line-strong);background:#fff;border-radius:8px;padding:7px 11px;cursor:pointer;font-size:.84rem;font-weight:900;color:var(--ink);box-shadow:0 4px 0 rgba(17,24,39,.06)}
.mini-list{display:grid;gap:0}
.mini-item{padding:15px 18px 15px 22px;border-top:1px solid var(--line)}
.mini-meta{display:flex;gap:8px;color:var(--faint);font-size:.78rem;font-weight:700;margin-bottom:4px}
.mini-item a{font-size:1.03rem;font-weight:900;line-height:1.48}
.feed-title{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:8px}
.feed-title h2{font-size:1.32rem;font-weight:900}
.feed-title p{color:var(--muted);font-size:.9rem;font-weight:600}
.date-group{margin-bottom:18px}
.date-divider{display:flex;align-items:center;gap:10px;margin:12px 0 8px;color:var(--muted);font-weight:800}
.date-divider:after{content:"";height:1px;background:var(--line);flex:1}
.date-divider .num{font-family:var(--mono);font-size:.82rem;color:var(--faint)}
.article-list{display:grid;gap:10px}
.article{background:rgba(255,255,255,.97);border:1px solid var(--line-strong);border-left:7px solid var(--accent);border-radius:10px;box-shadow:0 6px 16px rgba(15,23,42,.055);padding:16px 18px;transition:transform .15s,box-shadow .15s,border-color .15s}
.article:hover{transform:translateY(-1px);box-shadow:0 12px 24px rgba(15,23,42,.08);border-color:var(--line-strong)}
.article-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:4px}
.article-channel{font-size:.78rem;font-weight:800;color:var(--accent)}
.article-source{font-size:.78rem;color:var(--faint);font-weight:700;text-align:right}
.article h3{font-size:1.12rem;line-height:1.45;font-weight:800;letter-spacing:0}
.article h3 a:hover{text-decoration:underline;text-decoration-thickness:2px;text-underline-offset:3px}
.article-desc{font-size:.98rem;color:var(--muted);line-height:1.75;margin-top:7px}
.article-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;align-items:center}
.tag{display:inline-flex;align-items:center;border-radius:6px;padding:2px 7px;font-size:.73rem;font-weight:800;background:var(--panel-soft);color:var(--muted)}
.tag-claude{background:var(--claude-soft);color:var(--claude)}
.tag-openai{background:var(--openai-soft);color:var(--openai)}
.tag-gemini{background:var(--gemini-soft);color:var(--gemini)}
.tag-grok{background:var(--grok-soft);color:var(--grok)}
.tag-tool{background:#ecfdf3;color:var(--tool)}
.tag-model{background:#f4f3ff;color:var(--model)}
.tag-tutorial{background:#fffaeb;color:var(--tutorial)}
.tag-agent{background:#fdf2fa;color:var(--agent)}
.tag-integration{background:#f4f3ff;color:var(--integration)}
.tag-open{background:#ecfdf3;color:var(--open)}
.compact .article{padding:12px 14px}
.compact .article-desc{display:none}
.compact .article-meta{margin-top:7px}
.empty-section{background:var(--panel);border:1px dashed var(--line-strong);border-radius:8px;padding:28px;text-align:center;color:var(--muted);font-weight:700}
.footer{width:min(1720px,calc(100vw - 48px));margin:0 auto;padding:0 0 28px;color:var(--faint);font-size:.82rem;text-align:center}
@media(min-width:1400px){
  .channel-overview{grid-template-columns:repeat(4,minmax(0,1fr))}
}
@media(max-width:880px){
  .page{width:auto;margin:0;padding:22px 16px 38px}
  .header{grid-template-columns:1fr}
  .header-main{padding:24px 22px 24px;border-left-width:8px}
  .today-chip{width:100%}
  .layout{grid-template-columns:1fr}
  .rail{position:static}
  .channel-overview{grid-template-columns:1fr}
}
@media(max-width:620px){
  .toolbar-row{align-items:flex-start;flex-direction:column}
  .feed-title{align-items:flex-start;flex-direction:column;gap:4px}
  .article-top{align-items:flex-start;flex-direction:column;gap:2px}
  .article-source{text-align:left}
}

</div>

<footer class="footer">AI 新聞日報：Claude、ChatGPT、Gemini、Grok 每日動態追蹤</footer>

<script src="news/ai-news-data.js?v=20260602-zh"></script>
<script>
const CHANNELS = [
  { key:'all', label:'全部', accent:'#111827', soft:'#f9fafb' },
  { key:'claude', label:'Claude', full:'Claude / Anthropic', accent:'var(--claude)', soft:'var(--claude-soft)' },
  { key:'openai', label:'ChatGPT', full:'ChatGPT / OpenAI', accent:'var(--openai)', soft:'var(--openai-soft)' },
  { key:'gemini', label:'Gemini', full:'Gemini / Google AI', accent:'var(--gemini)', soft:'var(--gemini-soft)' },
  { key:'grok', label:'Grok', full:'Grok / xAI', accent:'var(--grok)', soft:'var(--grok-soft)' },
  { key:'news', label:'其他 AI', full:'其他 AI 新聞', accent:'var(--news)', soft:'var(--news-soft)' }
];
const TOPICS = [
  { key:'all', label:'全部主題' },
  { key:'model', label:'模型' },
  { key:'tool', label:'工具' },
  { key:'tutorial', label:'教學' },
  { key:'agent', label:'代理' },
  { key:'integration', label:'整合' },
  { key:'open', label:'開源' }
];
const TAG_MAP = {
  claude:'Claude', openai:'ChatGPT', gemini:'Gemini', grok:'Grok',
  tool:'工具', model:'模型', tutorial:'教學', agent:'代理',
  integration:'整合', open:'開源'
};
let activeChannel = 'all';
let activeTopic = 'all';
let activeView = 'detail';

function escapeHTML(value){
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[ch]));
}

function getChannel(key){
  return CHANNELS.find(channel => channel.key === key) || CHANNELS[0];
}

function allItemsFor(channelKey){
  const items = [];
  AI_NEWS_DATA.forEach(day => {
    (day[channelKey] || []).forEach(item => {
      items.push({
        ...item,
        _date: day.date,
        _weekday: day.weekday,
        _channel: channelKey
      });
    });
  });
  return items;
}

function allTrackedItems(){
  return ['claude','openai','gemini','grok','news'].flatMap(allItemsFor);
}

function itemMatchesTopic(item){
  return activeTopic === 'all' || (item.tags || []).includes(activeTopic);
}

function filteredItemsFor(channelKey){
  const base = channelKey === 'all' ? allTrackedItems() : allItemsFor(channelKey);
  return base.filter(itemMatchesTopic);
}

function formatDate(date, weekday){
  const [, month, day] = date.split('-');
  return `${parseInt(month, 10)}/${parseInt(day, 10)} ${weekday}`;
}

function renderTags(item){
  return (item.tags || []).map(tag => `<span class="tag tag-${escapeHTML(tag)}">${escapeHTML(TAG_MAP[tag] || tag)}</span>`).join('');
}

function renderArticle(item){
  const channel = getChannel(item._channel);
  const title = escapeHTML(item.title || item.name || '未命名');
  const desc = escapeHTML(item.desc || '');
  const source = item.source ? escapeHTML(item.source) : '來源未標示';
  const url = escapeHTML(item.url || '#');
  return `<article class="article" style="--accent:${channel.accent}">
    <div class="article-top">
      <span class="article-channel">${escapeHTML(channel.label)} · ${formatDate(item._date, item._weekday)}</span>
      <span class="article-source">${source}</span>
    </div>
    <h3><a href="${url}" target="_blank" rel="noopener">${title}</a></h3>
    ${desc ? `<p class="article-desc">${desc}</p>` : ''}
    <div class="article-meta">${renderTags(item)}</div>
  </article>`;
}

function groupByDate(items){
  return items.reduce((groups, item) => {
    (groups[item._date] = groups[item._date] || []).push(item);
    return groups;
  }, {});
}

function renderChannelFeed(channelKey){
  const channel = getChannel(channelKey);
  const items = filteredItemsFor(channelKey);
  if(items.length === 0){
    return `<div class="empty-section">這個分類目前沒有符合的新聞。</div>`;
  }
  const grouped = groupByDate(items);
  const title = channelKey === 'all' ? '全部 AI 更新' : (channel.full || channel.label);
  const copy = channelKey === 'all'
    ? '最新在前，先用日期分段；想追單一產品再點上方頻道。'
    : '從最新日期一路往下看，不需要逐日切換。';
  let html = `<div class="feed-title">
    <div>
      <h2>${escapeHTML(title)}</h2>
      <p>${escapeHTML(copy)}</p>
    </div>
  </div>`;
  Object.keys(grouped).forEach(date => {
    const first = grouped[date][0];
    html += `<section class="date-group">
      <div class="date-divider">${formatDate(date, first._weekday)} <span class="num">${grouped[date].length} 則</span></div>
      <div class="article-list">${grouped[date].map(renderArticle).join('')}</div>
    </section>`;
  });
  return html;
}

function renderOverview(){
  const panels = ['claude','openai','gemini','grok'].map(key => {
    const channel = getChannel(key);
    const items = filteredItemsFor(key);
    const preview = items.slice(0, 5).map(item => `
      <div class="mini-item">
        <div class="mini-meta"><span>${formatDate(item._date, item._weekday)}</span><span>${escapeHTML(item.source || '')}</span></div>
        <a href="${escapeHTML(item.url || '#')}" target="_blank" rel="noopener">${escapeHTML(item.title || item.name)}</a>
      </div>`).join('');
    return `<section class="channel-panel" style="--accent:${channel.accent};--soft:${channel.soft}">
      <div class="channel-panel-head">
        <h2>${escapeHTML(channel.full)}</h2>
        <button type="button" data-channel-jump="${key}">看全部 ${items.length}</button>
      </div>
      <div class="mini-list">${preview || '<div class="mini-item">目前沒有符合的新聞。</div>'}</div>
    </section>`;
  }).join('');
  return `<div class="channel-overview">${panels}</div>`;
}

function renderChannelBar(){
  const counts = {
    all: filteredItemsFor('all').length,
    claude: filteredItemsFor('claude').length,
    openai: filteredItemsFor('openai').length,
    gemini: filteredItemsFor('gemini').length,
    grok: filteredItemsFor('grok').length,
    news: filteredItemsFor('news').length
  };
  document.getElementById('channelBar').innerHTML = CHANNELS.map(channel => `
    <button class="channel-btn${activeChannel === channel.key ? ' active' : ''}" data-channel="${channel.key}">
      <span class="dot" style="background:${channel.accent}"></span>
      ${escapeHTML(channel.label)}
      <span class="count">${counts[channel.key] || 0}</span>
    </button>`).join('');
}

function renderTopicBar(){
  document.getElementById('topicFilterBar').innerHTML = TOPICS.map(topic => `
    <button class="topic-btn${activeTopic === topic.key ? ' active' : ''}" data-topic="${topic.key}">
      ${escapeHTML(topic.label)}
    </button>`).join('');
}

function renderStats(){
  const rows = ['claude','openai','gemini','grok','news'].map(key => {
    const channel = getChannel(key);
    return `<div class="stat-row">
      <span class="stat-name"><span class="stat-dot" style="background:${channel.accent}"></span>${escapeHTML(channel.label)}</span>
      <strong>${allItemsFor(key).length}</strong>
    </div>`;
  }).join('');
  document.getElementById('statsRail').innerHTML = rows;
}

function renderSummary(){
  const items = filteredItemsFor(activeChannel);
  const channel = getChannel(activeChannel);
  const topic = TOPICS.find(t => t.key === activeTopic);
  document.getElementById('resultSummary').textContent =
    `${channel.label} · ${topic ? topic.label : '全部主題'} · ${items.length} 則`;
}

function renderHeaderDate(){
  if(!AI_NEWS_DATA || AI_NEWS_DATA.length === 0) return;
  const latest = AI_NEWS_DATA[0];
  const [year, month, day] = latest.date.split('-');
  document.getElementById('headerDate').textContent =
    `${year}/${parseInt(month, 10)}/${parseInt(day, 10)} ${latest.weekday}`;
}

function renderMain(){
  const main = document.getElementById('main');
  main.classList.toggle('compact', activeView === 'compact');
  main.innerHTML = renderChannelFeed(activeChannel);
  renderChannelBar();
  renderTopicBar();
  renderSummary();
}

document.getElementById('channelBar').addEventListener('click', event => {
  const button = event.target.closest('[data-channel]');
  if(!button) return;
  activeChannel = button.dataset.channel;
  renderMain();
});

document.getElementById('topicFilterBar').addEventListener('click', event => {
  const button = event.target.closest('[data-topic]');
  if(!button) return;
  activeTopic = button.dataset.topic;
  renderMain();
});

document.getElementById('main').addEventListener('click', event => {
  const button = event.target.closest('[data-channel-jump]');
  if(!button) return;
  activeChannel = button.dataset.channelJump;
  renderMain();
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

document.querySelector('.view-toggle').addEventListener('click', event => {
  const button = event.target.closest('[data-view]');
  if(!button) return;
  activeView = button.dataset.view;
  document.querySelectorAll('.view-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.view === activeView));
  renderMain();
});

renderHeaderDate();
renderStats();
renderMain();
</script>
</body>
</html>
